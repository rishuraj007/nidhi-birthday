<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Nidhi ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #0a0a0a;
            color: white;
            text-align: center;
        }

        /* Background with smooth transitions */
        #bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(3px) brightness(70%);
            z-index: 1;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            animation: fadeInBg 1.5s ease-in forwards;
        }

        @keyframes fadeInBg {
            to { opacity: 1; }
        }

        /* Gradient overlay for better text readability */
        #bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(0, 0, 0, 0.3) 0%,
                rgba(0, 0, 0, 0.5) 100%
            );
        }

        /* Enhanced card design */
        #card {
            position: relative;
            z-index: 10;
            width: 90vw;
            max-width: 500px;
            padding: 40px 35px;
            background: rgba(15, 15, 15, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 80px rgba(255, 77, 109, 0.15);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #card:hover {
            transform: translateY(-5px);
            box-shadow: 
                0 25px 70px rgba(0, 0, 0, 0.6),
                0 0 100px rgba(255, 77, 109, 0.2);
        }

        @media (max-width: 480px) {
            #card {
                width: 92vw;
                padding: 35px 25px;
                border-radius: 20px;
            }
            
            #card:hover {
                transform: translateY(0);
            }
        }

        /* Text styling */
        #text {
            font-size: 19px;
            line-height: 1.8;
            min-height: 220px;
            white-space: pre-line;
            font-weight: 300;
            letter-spacing: 0.3px;
            color: rgba(255, 255, 255, 0.95);
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        /* Enhanced button */
        button {
            margin-top: 30px;
            padding: 16px 36px;
            font-size: 17px;
            font-weight: 500;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #ff4d6d 0%, #ff6b88 100%);
            color: white;
            cursor: pointer;
            box-shadow: 
                0 8px 25px rgba(255, 77, 109, 0.4),
                0 0 0 0 rgba(255, 77, 109, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            min-height: 50px;
            min-width: 180px;
            z-index: 10;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover::before {
            width: 300px;
            height: 300px;
        }

        button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 
                0 12px 35px rgba(255, 77, 109, 0.5),
                0 0 40px rgba(255, 77, 109, 0.3);
        }

        button:active {
            transform: translateY(-1px) scale(1.02);
        }

        @media (max-width: 480px) {
            button {
                font-size: 16px;
                padding: 16px 32px;
                min-height: 52px;
                min-width: 160px;
                margin-top: 25px;
            }
            
            button:hover {
                transform: scale(1);
            }
            
            button:active {
                transform: scale(0.97);
            }
        }

        /* Signature with elegant font */
        #signature {
            margin-top: 30px;
            font-size: 24px;
            font-family: 'Dancing Script', cursive;
            opacity: 0;
            animation: fadeInSignature 1.5s ease-in forwards 0.5s;
            color: #ff4d6d;
            text-shadow: 0 0 20px rgba(255, 77, 109, 0.5);
        }

        @keyframes fadeInSignature {
            to { opacity: 1; }
        }

        /* Floating hearts animation */
        .heart {
            position: fixed;
            bottom: -50px;
            font-size: 32px;
            animation: floatUp 7s ease-in-out infinite;
            z-index: 2;
            filter: drop-shadow(0 0 8px rgba(255, 77, 109, 0.6));
            pointer-events: none;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-110vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Enhanced sparkle animation */
        .sparkle {
            position: fixed;
            color: #ffd700;
            font-size: 20px;
            animation: sparkleFloat 2.5s ease-out forwards;
            z-index: 10;
            filter: drop-shadow(0 0 5px #ffd700);
            pointer-events: none;
        }

        @keyframes sparkleFloat {
            0% {
                opacity: 0;
                transform: translateY(0) scale(0.3) rotate(0deg);
            }
            20% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) scale(1.8) rotate(180deg);
            }
        }

        /* Loading animation */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeOut 1s ease-out 1.5s forwards;
        }

        .loading-heart {
            font-size: 60px;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                pointer-events: none;
            }
        }

        /* Responsive design */
        @media (max-width: 480px) {
            #card {
                padding: 30px 25px;
            }
            
            #text {
                font-size: 17px;
                min-height: 200px;
                line-height: 1.7;
            }
            
            button {
                font-size: 16px;
                padding: 14px 30px;
            }
            
            /* Prevent zoom on input focus */
            button, input, select, textarea {
                font-size: 16px;
            }
        }

        /* Optimize for very small screens */
        @media (max-width: 360px) {
            #text {
                font-size: 16px;
                min-height: 180px;
            }
            
            .birthday-banner {
                font-size: 20px;
                padding: 12px 25px;
            }
        }

        /* Particle effect */
        .particle {
            position: fixed;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.6;
            animation: particleFloat 3s linear infinite;
            z-index: 3;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100vh) translateX(calc(var(--drift) * 30px));
                opacity: 0;
            }
        }

        /* String lights */
        .string-lights {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .light-bulb {
            position: absolute;
            width: 20px;
            height: 25px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: 
                0 0 25px currentColor, 
                0 0 50px currentColor,
                0 0 75px currentColor;
            animation: twinkle 2s ease-in-out infinite;
            filter: brightness(1.3);
        }

        @keyframes twinkle {
            0%, 100% { 
                opacity: 1; 
                filter: brightness(1.3);
                transform: scale(1);
            }
            50% { 
                opacity: 0.7; 
                filter: brightness(1.8);
                transform: scale(1.1);
            }
        }

        @media (max-width: 480px) {
            .light-bulb {
                width: 18px;
                height: 23px;
            }
        }

        /* Balloons */
        .balloon {
            position: fixed;
            bottom: -200px;
            font-size: 80px;
            z-index: 4;
            pointer-events: none;
            animation: balloonFloat 6s ease-in-out forwards;
            filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.3));
        }

        @keyframes balloonFloat {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            20% {
                opacity: 1;
            }
            100% {
                transform: translateY(-120vh) translateX(var(--drift)) rotate(var(--rotate));
                opacity: 1;
            }
        }

        /* Birthday Cake */
        .birthday-cake {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            font-size: 200px;
            z-index: 6;
            animation: cakeAppear 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
            filter: drop-shadow(0 15px 40px rgba(255, 200, 0, 0.6));
        }

        @keyframes cakeAppear {
            0% {
                transform: translateX(-50%) scale(0) rotate(-180deg);
                opacity: 0;
            }
            60% {
                transform: translateX(-50%) scale(1.15) rotate(10deg);
            }
            80% {
                transform: translateX(-50%) scale(0.95) rotate(-5deg);
            }
            100% {
                transform: translateX(-50%) scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        @media (max-width: 480px) {
            .birthday-cake {
                font-size: 160px;
                bottom: 100px;
            }
        }

        /* Cake cutting animation */
        .knife {
            position: fixed;
            font-size: 80px;
            z-index: 7;
            top: 20%;
            left: 50%;
            transform: translateX(-50%) rotate(-45deg);
            animation: knifeSlice 3s cubic-bezier(0.34, 0.61, 0.35, 1) forwards;
            filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.5));
        }

        @keyframes knifeSlice {
            0% {
                transform: translateX(-50%) translateY(-150px) rotate(-45deg);
                opacity: 0;
            }
            15% {
                opacity: 1;
            }
            25% {
                transform: translateX(-50%) translateY(-50px) rotate(-45deg);
            }
            55% {
                transform: translateX(-50%) translateY(120px) rotate(-50deg);
            }
            70% {
                transform: translateX(-50%) translateY(140px) rotate(-48deg);
            }
            85% {
                transform: translateX(-50%) translateY(130px) rotate(-50deg);
            }
            100% {
                transform: translateX(-50%) translateY(200px) rotate(-45deg);
                opacity: 0;
            }
        }

        @media (max-width: 480px) {
            .knife {
                font-size: 70px;
            }
        }

        /* Happy Birthday Banner */
        .birthday-banner {
            position: fixed;
            top: 50px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            background: linear-gradient(135deg, #FF6B9D 0%, #C44569 50%, #FF6B9D 100%);
            padding: 20px 50px;
            border-radius: 15px;
            font-size: 32px;
            font-weight: 600;
            color: white;
            text-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
            box-shadow: 
                0 10px 40px rgba(255, 107, 157, 0.5),
                inset 0 -3px 0 rgba(0, 0, 0, 0.2);
            z-index: 8;
            animation: bannerDrop 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
            border: 3px solid rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
        }

        .birthday-banner::before,
        .birthday-banner::after {
            content: '🎉';
            position: absolute;
            font-size: 30px;
            animation: rotateStar 3s ease-in-out infinite;
        }

        .birthday-banner::before {
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
        }

        .birthday-banner::after {
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            animation-delay: 0.5s;
        }

        @keyframes bannerDrop {
            0% {
                transform: translateX(-50%) translateY(-200px) scale(0) rotate(-10deg);
                opacity: 0;
            }
            60% {
                transform: translateX(-50%) translateY(20px) scale(1.1) rotate(5deg);
            }
            80% {
                transform: translateX(-50%) translateY(-10px) scale(0.95) rotate(-2deg);
            }
            100% {
                transform: translateX(-50%) translateY(0) scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        @keyframes rotateStar {
            0%, 100% { transform: translateY(-50%) rotate(0deg) scale(1); }
            50% { transform: translateY(-50%) rotate(20deg) scale(1.2); }
        }

        @media (max-width: 480px) {
            .birthday-banner {
                font-size: 24px;
                padding: 15px 30px;
                top: 30px;
            }
            
            .birthday-banner::before,
            .birthday-banner::after {
                font-size: 24px;
            }
        }

        /* Cake pieces explosion */
        .cake-piece {
            position: fixed;
            font-size: 50px;
            z-index: 6;
            animation: explodePiece 2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.3));
        }

        @keyframes explodePiece {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(1);
                opacity: 1;
            }
            20% {
                transform: translate(calc(var(--x) * 0.3), calc(var(--y) * 0.3)) rotate(calc(var(--rotate) * 0.3)) scale(1.1);
                opacity: 1;
            }
            60% {
                transform: translate(calc(var(--x) * 0.8), calc(var(--y) * 0.8)) rotate(calc(var(--rotate) * 0.8)) scale(0.9);
                opacity: 0.8;
            }
            100% {
                transform: translate(var(--x), var(--y)) rotate(var(--rotate)) scale(0.6);
                opacity: 0;
            }
        }

        @media (max-width: 480px) {
            .cake-piece {
                font-size: 45px;
            }
        }

        /* Confetti */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            z-index: 8;
            animation: confettiFall 3s ease-out forwards;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-20px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Warm light background */
        .warm-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(255, 184, 77, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 140, 105, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 40% 70%, rgba(255, 200, 124, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(255, 170, 100, 0.12) 0%, transparent 50%),
                linear-gradient(to bottom, #1a1410 0%, #0f0a06 50%, #000000 100%);
            opacity: 0;
            z-index: 1;
            transition: opacity 3s ease-in-out;
        }

        .warm-background.active {
            opacity: 1;
            animation: warmGlow 4s ease-in-out infinite alternate;
        }

        @keyframes warmGlow {
            0% {
                filter: brightness(1);
            }
            100% {
                filter: brightness(1.2);
            }
        }
    </style>
</head>

<body>
    <!-- Loading screen -->
    <div class="loading">
        <div class="loading-heart">❤️</div>
    </div>

    <div class="warm-background"></div>
    <div id="bg"></div>

    <div id="card">
        <div id="text"></div>
        <button id="nextBtn" onclick="nextPage()">Next ❤️</button>
        <div id="signature" style="display: none;">— Rishu ❤️</div>
    </div>

    <script>
        /* Pages data */
        const pages = [
            {
                image: "photo1.png",
                text: `Happy Birthday cutieeee ❤️❤️

Today is special
because the most beautiful person
in my life was born.

Your smile makes my day better,
and somehow you make my world
a little brighter just by being in it.`,
                button: "Next ❤️"
            },
            {
                image: "black",
                text: `Ready for a little shayari?
😮‍💨😮‍💨😮‍💨`,
                button: "Arz Kiya Hai 🎤"
            },
            {
                image: "photo2.png",
                text: `Din bhar ki daud mein

Jab dil thak sa jata hai

Raat mein aapki reels dekh ke

Dil muskura sa jata hai`,
                button: "Muskura Ke Dabaye ❤️"
            },
            {
                image: "photo3.png",
                text: `Kabhi kabhi apni tasveer bhej diya karo

Dil ko thoda sa khush kar diya karo

Har baar mujhe maangna na pade

Kabhi kabhi surprise hi de diya karo`,
                button: "Dil Se Dabaye ❤️"
            },
            {
                image: "photo4.png",
                text: `Aapki mehnat ek din rang layegi

CA Final ki manzil bhi tumhe mil jayegi

Main har dua mein tumhara naam rakhta hoon

Mujhe pata hai meri madamji zaroor jeet jayegi`,
                button: "Dabaye ❤️"
            },
            {
                image: "photo5.png",
                text: `Shayari likhna itna aasaan nahi tha

Dil ki baat kehna bhi utna aasaan nahi tha

Isliye thodi madad ChatGPT se le li maine
🥹👉👈
Par har lafz ke peeche ehsaas sirf mera hi tha`,
                button: "Ready for a surprise?"
            },
            {
                image: "black",
                text: `Turn on the lights! 💡`,
                button: "Turn On ✨",
                special: "lights"
            },
            {
                image: "black",
                text: `Let's decorate! 🎉`,
                button: "Decorate 🎈",
                special: "decorate"
            },
            {
                image: "black",
                text: `Time to cut the cake! 🎂`,
                button: "Cut the Cake 🔪",
                special: "cake"
            },
            {
                image: "photo6.jpeg",
                text: `One day soon,

I will proudly call you
my wife.

Until that day comes,

I will keep reminding you

how special you are to me.

Happy Birthday madamji!

I love you so much ❤️`,
                button: ""
            }
        ];

        let page = 0;

        function showPage() {
            const current = pages[page];

            // Update background
            const bgImage = current.image === "black" ? "" : `url('${current.image}')`;
            const bg = document.getElementById("bg");
            bg.style.backgroundImage = bgImage;
            bg.style.backgroundColor = current.image === "black" ? "#0a0a0a" : "";

            // Update text with typing effect
            const textElement = document.getElementById("text");
            textElement.style.opacity = 0;
            setTimeout(() => {
                textElement.innerText = current.text;
                textElement.style.transition = "opacity 0.8s ease-in";
                textElement.style.opacity = 1;
            }, 200);

            const btn = document.getElementById("nextBtn");

            if (current.button === "") {
                btn.style.display = "none";
                document.getElementById("signature").style.display = "block";
                sparkleBurst();
                createParticles();
            } else {
                btn.style.display = "inline-block";
                btn.innerText = current.button;
            }

            // Handle special pages
            if (current.special === "lights") {
                // Don't animate hearts on lights page
            } else if (current.special === "decorate") {
                // Don't animate hearts on decorate page
            } else if (current.special === "cake") {
                // Don't animate hearts on cake page
            } else {
                celebrationHearts();
            }
        }

        /* Navigate to next page */
        function nextPage() {
            if (page < pages.length - 1) {
                const currentPage = pages[page];
                
                // Trigger special animations before moving to next page
                if (currentPage.special === "lights") {
                    turnOnLights();
                } else if (currentPage.special === "decorate") {
                    decorateRoom();
                } else if (currentPage.special === "cake") {
                    cutCake();
                    return; // Don't advance immediately, wait for animation
                }

                page++;
                const card = document.getElementById("card");
                card.style.opacity = 0;
                card.style.transform = "scale(0.95)";

                setTimeout(() => {
                    showPage();
                    card.style.transition = "all 0.6s cubic-bezier(0.4, 0, 0.2, 1)";
                    card.style.opacity = 1;
                    card.style.transform = "scale(1)";
                }, 400);
            }
        }

        /* Enhanced hearts animation */
        function celebrationHearts() {
            for (let i = 0; i < 12; i++) {
                setTimeout(() => {
                    const heart = document.createElement("div");
                    heart.className = "heart";
                    heart.innerHTML = "❤️";
                    heart.style.left = Math.random() * 100 + "vw";
                    heart.style.fontSize = (24 + Math.random() * 20) + "px";
                    heart.style.animationDelay = (Math.random() * 2) + "s";
                    heart.style.animationDuration = (6 + Math.random() * 3) + "s";
                    
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 10000);
                }, i * 200);
            }
        }

        /* Enhanced sparkle burst */
        function sparkleBurst() {
            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    const sparkle = document.createElement("div");
                    sparkle.className = "sparkle";
                    sparkle.innerHTML = "✨";
                    sparkle.style.left = Math.random() * 100 + "vw";
                    sparkle.style.top = Math.random() * 100 + "vh";
                    sparkle.style.animationDelay = (Math.random() * 0.5) + "s";
                    
                    document.body.appendChild(sparkle);
                    setTimeout(() => sparkle.remove(), 3000);
                }, i * 50);
            }
        }

        /* Particle effect for final page */
        function createParticles() {
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement("div");
                particle.className = "particle";
                particle.style.left = Math.random() * 100 + "vw";
                particle.style.top = "100vh";
                particle.style.setProperty('--drift', (Math.random() - 0.5) * 2);
                particle.style.animationDelay = (Math.random() * 2) + "s";
                particle.style.animationDuration = (4 + Math.random() * 3) + "s";
                
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 8000);
            }
        }

        /* Turn on the lights */
        function turnOnLights() {
            const warmBg = document.querySelector('.warm-background');
            warmBg.classList.add('active');

            // Create string lights container
            const lightsContainer = document.createElement('div');
            lightsContainer.className = 'string-lights';
            document.body.appendChild(lightsContainer);

            const colors = ['#FFD700', '#FF6B9D', '#4ECDC4', '#FF6B6B', '#95E1D3', '#FFA07A'];
            
            // Create multiple strings of lights
            for (let row = 0; row < 4; row++) {
                for (let i = 0; i < 15; i++) {
                    setTimeout(() => {
                        const light = document.createElement('div');
                        light.className = 'light-bulb';
                        light.style.color = colors[Math.floor(Math.random() * colors.length)];
                        light.style.left = (i * 7) + '%';
                        light.style.top = (row * 25) + 'px';
                        light.style.animationDelay = (Math.random() * 2) + 's';
                        lightsContainer.appendChild(light);
                    }, i * 50);
                }
            }
        }

        /* Decorate with balloons and sparklers */
        function decorateRoom() {
            // Add Happy Birthday Banner
            const banner = document.createElement('div');
            banner.className = 'birthday-banner';
            banner.innerHTML = 'Happy Birthday Nidhi!';
            banner.id = 'birthdayBanner';
            document.body.appendChild(banner);

            const balloonColors = ['🎈', '🎈', '🎈', '🎈', '🎈'];
            const balloonEmojis = ['🎈', '🎉', '🎊', '✨', '🎁'];

            // Create balloons
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const balloon = document.createElement('div');
                    balloon.className = 'balloon';
                    balloon.innerHTML = balloonEmojis[Math.floor(Math.random() * balloonEmojis.length)];
                    balloon.style.left = Math.random() * 100 + 'vw';
                    balloon.style.setProperty('--drift', (Math.random() - 0.5) * 200 + 'px');
                    balloon.style.setProperty('--rotate', (Math.random() - 0.5) * 360 + 'deg');
                    balloon.style.animationDelay = (Math.random() * 1) + 's';
                    
                    document.body.appendChild(balloon);
                    setTimeout(() => balloon.remove(), 7000);
                }, i * 150);
            }

            // Add continuous sparklers
            const sparklerInterval = setInterval(() => {
                for (let i = 0; i < 5; i++) {
                    const sparkle = document.createElement('div');
                    sparkle.className = 'sparkle';
                    sparkle.innerHTML = '✨';
                    sparkle.style.left = Math.random() * 100 + 'vw';
                    sparkle.style.top = Math.random() * 100 + 'vh';
                    sparkle.style.animationDelay = (Math.random() * 0.3) + 's';
                    
                    document.body.appendChild(sparkle);
                    setTimeout(() => sparkle.remove(), 2500);
                }
            }, 500);

            // Show birthday cake
            setTimeout(() => {
                const cake = document.createElement('div');
                cake.className = 'birthday-cake';
                cake.innerHTML = '🎂';
                cake.id = 'birthdayCake';
                document.body.appendChild(cake);
                
                // Clear sparkler interval after some time
                setTimeout(() => clearInterval(sparklerInterval), 5000);
            }, 2000);
        }

        /* Cut the cake animation */
        function cutCake() {
            // Hide button immediately
            document.getElementById("nextBtn").style.display = "none";
            
            // Make card transparent to see the cake cutting animation
            const card = document.getElementById("card");
            card.style.transition = "opacity 0.5s ease-out";
            card.style.opacity = 0;

            // Knife cutting animation - slower and more realistic
            setTimeout(() => {
                const knife = document.createElement('div');
                knife.className = 'knife';
                knife.innerHTML = '🔪';
                document.body.appendChild(knife);

                // Wait for knife animation to complete (3 seconds)
                setTimeout(() => {
                    knife.remove();
                    
                    // Explode cake into pieces
                    const cakeElement = document.getElementById('birthdayCake');
                    if (cakeElement) {
                        cakeElement.style.transition = 'all 0.3s ease-out';
                        cakeElement.style.transform = 'translateX(-50%) scale(0.95)';
                        
                        setTimeout(() => {
                            cakeElement.style.display = 'none';
                            
                            // Create cake pieces with better distribution
                            const pieces = ['🍰', '🧁', '🍰', '🧁', '🍰', '🧁', '🍰', '🧁'];
                            pieces.forEach((piece, index) => {
                                const cakePiece = document.createElement('div');
                                cakePiece.className = 'cake-piece';
                                cakePiece.innerHTML = piece;
                                cakePiece.style.left = '50%';
                                cakePiece.style.bottom = '80px';
                                
                                const angle = (index / pieces.length) * Math.PI * 2;
                                const distance = 250;
                                cakePiece.style.setProperty('--x', Math.cos(angle) * distance + 'px');
                                cakePiece.style.setProperty('--y', Math.sin(angle) * distance - 100 + 'px');
                                cakePiece.style.setProperty('--rotate', (Math.random() * 720 - 360) + 'deg');
                                
                                document.body.appendChild(cakePiece);
                                setTimeout(() => cakePiece.remove(), 2000);
                            });

                            // Massive confetti explosion
                            for (let i = 0; i < 150; i++) {
                                setTimeout(() => {
                                    const confetti = document.createElement('div');
                                    confetti.className = 'confetti';
                                    const colors = ['#FF6B6B', '#4ECDC4', '#FFD93D', '#6BCF7F', '#FF6B9D', '#95E1D3', '#FFA07A', '#98D8C8'];
                                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                                    confetti.style.left = (40 + Math.random() * 20) + '%';
                                    confetti.style.top = '35%';
                                    confetti.style.animationDelay = (Math.random() * 0.3) + 's';
                                    confetti.style.animationDuration = (2.5 + Math.random() * 1.5) + 's';
                                    
                                    document.body.appendChild(confetti);
                                    setTimeout(() => confetti.remove(), 4000);
                                }, i * 15);
                            }
                        }, 200);
                    }

                    // Move to final page after all animations complete
                    setTimeout(() => {
                        page++;
                        card.style.opacity = 0;
                        card.style.transform = 'scale(0.9)';
                        
                        setTimeout(() => {
                            showPage();
                            card.style.transition = 'all 0.8s cubic-bezier(0.4, 0, 0.2, 1)';
                            card.style.opacity = 1;
                            card.style.transform = 'scale(1)';
                        }, 500);
                    }, 3000);
                }, 3000);
            }, 500);
        }

        // Initialize
        showPage();

        // Add smooth scroll prevention
        document.body.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
